apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nivora.fullname" . }}-config
  labels:
    {{- include "nivora.labels" . | nindent 4 }}
data:
  server.yaml: |
    app:
      name: nivora-server
    environment: {{ .Values.config.environment | quote }}
    http:
      bind_address: ":8080"
    database:
      runtime_store: {{ .Values.config.runtimeStore | quote }}
      url: {{ .Values.config.databaseURL | quote }}
    event_bus:
      type: {{ .Values.config.eventBusType | quote }}
    object_store:
      type: {{ .Values.config.objectStoreType | quote }}
      path: {{ .Values.config.objectStorePath | quote }}
    log:
      level: {{ .Values.config.logLevel | quote }}
    telemetry:
      enabled: {{ .Values.config.telemetryEnabled }}
      endpoint: {{ .Values.config.telemetryEndpoint | quote }}
    mcp:
      enabled: {{ .Values.config.mcp.enabled }}
      mode: {{ .Values.config.mcp.mode | quote }}
      readonly: {{ .Values.config.mcp.readonly }}
      allow_plan_tools: {{ .Values.config.mcp.allowPlanTools }}
      allow_action_tools: {{ .Values.config.mcp.allowActionTools }}
      subject_role: {{ .Values.config.mcp.subjectRole | quote }}
      token_env: {{ .Values.config.mcp.tokenEnv | quote }}
      request_timeout: {{ .Values.config.mcp.requestTimeout | quote }}
      max_response_bytes: {{ .Values.config.mcp.maxResponseBytes }}
    auth:
      enabled: {{ .Values.config.auth.enabled }}
      mode: {{ .Values.config.auth.mode | quote }}
      dev_user: {{ .Values.config.auth.devUser | quote }}
      static_token_env: {{ .Values.config.auth.staticTokenEnv | quote }}
      issuer: ""
      oidc:
        issuer: {{ .Values.config.auth.oidc.issuer | quote }}
        client_id: {{ .Values.config.auth.oidc.clientId | quote }}
        jwks_url: {{ .Values.config.auth.oidc.jwksUrl | quote }}
        scopes: []
        groups_claim: {{ .Values.config.auth.oidc.groupsClaim | quote }}
        username_claim: {{ .Values.config.auth.oidc.usernameClaim | quote }}
    runner:
      name: {{ .Values.runner.name | quote }}
      group: {{ .Values.runner.group | quote }}
      heartbeat_interval: "30s"
    runtime:
      allow_local_shell_executor: {{ .Values.config.runtime.allowLocalShellExecutor }}
      allow_privileged_executor: {{ .Values.config.runtime.allowPrivilegedExecutor }}
      allow_remote_host_deploy: {{ .Values.config.runtime.allowRemoteHostDeploy }}
      allow_kubernetes_apply: {{ .Values.config.runtime.allowKubernetesApply }}
      allow_argo_sync: {{ .Values.config.runtime.allowArgoSync }}
      allow_insecure_registry: {{ .Values.config.runtime.allowInsecureRegistry }}
      runner_isolation_profile: {{ .Values.config.runtime.runnerIsolationProfile | quote }}
      allow_docker_socket_mount: {{ .Values.config.runtime.allowDockerSocketMount }}
      allow_host_path_mount: {{ .Values.config.runtime.allowHostPathMount }}
  worker.yaml: |
    app:
      name: nivora-worker
    environment: {{ .Values.config.environment | quote }}
    http:
      bind_address: ":8081"
    database:
      runtime_store: {{ .Values.config.runtimeStore | quote }}
      url: {{ .Values.config.databaseURL | quote }}
    event_bus:
      type: {{ .Values.config.eventBusType | quote }}
    object_store:
      type: {{ .Values.config.objectStoreType | quote }}
      path: {{ .Values.config.objectStorePath | quote }}
    log:
      level: {{ .Values.config.logLevel | quote }}
    telemetry:
      enabled: {{ .Values.config.telemetryEnabled }}
      endpoint: {{ .Values.config.telemetryEndpoint | quote }}
    mcp:
      enabled: {{ .Values.config.mcp.enabled }}
      mode: {{ .Values.config.mcp.mode | quote }}
      readonly: {{ .Values.config.mcp.readonly }}
      allow_plan_tools: {{ .Values.config.mcp.allowPlanTools }}
      allow_action_tools: {{ .Values.config.mcp.allowActionTools }}
      subject_role: {{ .Values.config.mcp.subjectRole | quote }}
      token_env: {{ .Values.config.mcp.tokenEnv | quote }}
      request_timeout: {{ .Values.config.mcp.requestTimeout | quote }}
      max_response_bytes: {{ .Values.config.mcp.maxResponseBytes }}
    auth:
      enabled: {{ .Values.config.auth.enabled }}
      mode: {{ .Values.config.auth.mode | quote }}
      dev_user: {{ .Values.config.auth.devUser | quote }}
      static_token_env: {{ .Values.config.auth.staticTokenEnv | quote }}
      issuer: ""
      oidc:
        issuer: {{ .Values.config.auth.oidc.issuer | quote }}
        client_id: {{ .Values.config.auth.oidc.clientId | quote }}
        jwks_url: {{ .Values.config.auth.oidc.jwksUrl | quote }}
        scopes: []
        groups_claim: {{ .Values.config.auth.oidc.groupsClaim | quote }}
        username_claim: {{ .Values.config.auth.oidc.usernameClaim | quote }}
    runner:
      name: {{ .Values.runner.name | quote }}
      group: {{ .Values.runner.group | quote }}
      heartbeat_interval: "30s"
    runtime:
      allow_local_shell_executor: {{ .Values.config.runtime.allowLocalShellExecutor }}
      allow_privileged_executor: {{ .Values.config.runtime.allowPrivilegedExecutor }}
      allow_remote_host_deploy: {{ .Values.config.runtime.allowRemoteHostDeploy }}
      allow_kubernetes_apply: {{ .Values.config.runtime.allowKubernetesApply }}
      allow_argo_sync: {{ .Values.config.runtime.allowArgoSync }}
      allow_insecure_registry: {{ .Values.config.runtime.allowInsecureRegistry }}
      runner_isolation_profile: {{ .Values.config.runtime.runnerIsolationProfile | quote }}
      allow_docker_socket_mount: {{ .Values.config.runtime.allowDockerSocketMount }}
      allow_host_path_mount: {{ .Values.config.runtime.allowHostPathMount }}
  runner.yaml: |
    app:
      name: nivora-runner
    environment: {{ .Values.config.environment | quote }}
    http:
      bind_address: ":8082"
    database:
      runtime_store: {{ .Values.config.runtimeStore | quote }}
      url: {{ .Values.config.databaseURL | quote }}
    event_bus:
      type: {{ .Values.config.eventBusType | quote }}
    object_store:
      type: {{ .Values.config.objectStoreType | quote }}
      path: {{ .Values.config.objectStorePath | quote }}
    log:
      level: {{ .Values.config.logLevel | quote }}
    telemetry:
      enabled: {{ .Values.config.telemetryEnabled }}
      endpoint: {{ .Values.config.telemetryEndpoint | quote }}
    mcp:
      enabled: {{ .Values.config.mcp.enabled }}
      mode: {{ .Values.config.mcp.mode | quote }}
      readonly: {{ .Values.config.mcp.readonly }}
      allow_plan_tools: {{ .Values.config.mcp.allowPlanTools }}
      allow_action_tools: {{ .Values.config.mcp.allowActionTools }}
      subject_role: {{ .Values.config.mcp.subjectRole | quote }}
      token_env: {{ .Values.config.mcp.tokenEnv | quote }}
      request_timeout: {{ .Values.config.mcp.requestTimeout | quote }}
      max_response_bytes: {{ .Values.config.mcp.maxResponseBytes }}
    auth:
      enabled: {{ .Values.config.auth.enabled }}
      mode: {{ .Values.config.auth.mode | quote }}
      dev_user: {{ .Values.config.auth.devUser | quote }}
      static_token_env: {{ .Values.config.auth.staticTokenEnv | quote }}
      issuer: ""
      oidc:
        issuer: {{ .Values.config.auth.oidc.issuer | quote }}
        client_id: {{ .Values.config.auth.oidc.clientId | quote }}
        jwks_url: {{ .Values.config.auth.oidc.jwksUrl | quote }}
        scopes: []
        groups_claim: {{ .Values.config.auth.oidc.groupsClaim | quote }}
        username_claim: {{ .Values.config.auth.oidc.usernameClaim | quote }}
    runner:
      name: {{ .Values.runner.name | quote }}
      group: {{ .Values.runner.group | quote }}
      heartbeat_interval: "30s"
    runtime:
      allow_local_shell_executor: {{ .Values.config.runtime.allowLocalShellExecutor }}
      allow_privileged_executor: {{ .Values.config.runtime.allowPrivilegedExecutor }}
      allow_remote_host_deploy: {{ .Values.config.runtime.allowRemoteHostDeploy }}
      allow_kubernetes_apply: {{ .Values.config.runtime.allowKubernetesApply }}
      allow_argo_sync: {{ .Values.config.runtime.allowArgoSync }}
      allow_insecure_registry: {{ .Values.config.runtime.allowInsecureRegistry }}
      runner_isolation_profile: {{ .Values.config.runtime.runnerIsolationProfile | quote }}
      allow_docker_socket_mount: {{ .Values.config.runtime.allowDockerSocketMount }}
      allow_host_path_mount: {{ .Values.config.runtime.allowHostPathMount }}
