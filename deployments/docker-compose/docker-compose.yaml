services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nivora
      POSTGRES_DB: nivora
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nivora -d nivora"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${NIVORA_MINIO_ROOT_USER:-nivora-local}
      MINIO_ROOT_PASSWORD: ${NIVORA_MINIO_ROOT_PASSWORD:-set-local-minio-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  nivora-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: nivora:local
    command: ["server", "--config", "/etc/nivora/server.yaml"]
    ports:
      - "8080:8080"
    volumes:
      - ../../configs/docker-compose.server.yaml:/etc/nivora/server.yaml:ro
      - nivora-objectstore:/var/lib/nivora/objectstore
    depends_on:
      postgres:
        condition: service_healthy

  nivora-worker:
    image: nivora:local
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["worker", "--config", "/etc/nivora/worker.yaml"]
    volumes:
      - ../../configs/docker-compose.worker.yaml:/etc/nivora/worker.yaml:ro
      - nivora-objectstore:/var/lib/nivora/objectstore
    depends_on:
      postgres:
        condition: service_healthy

  nivora-runner:
    image: nivora:local
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["runner", "--config", "/etc/nivora/runner.yaml"]
    profiles: ["runner"]
    volumes:
      - ../../configs/docker-compose.runner.yaml:/etc/nivora/runner.yaml:ro
      - nivora-objectstore:/var/lib/nivora/objectstore

volumes:
  postgres-data:
  minio-data:
  nivora-objectstore:
