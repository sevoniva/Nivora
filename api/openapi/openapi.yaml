components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API token, service account token, static token, or future OIDC access token
      description: Control-plane API authentication. Permissions are enforced by route-specific RBAC middleware.
    RunnerTokenAuth:
      type: apiKey
      in: header
      name: X-Nivora-Runner-Token
      description: Runner protocol token. Valid only for runner heartbeat, job claim, job log append, and job status update endpoints.
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Optional page size. When omitted, legacy array responses are returned for compatibility.
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
    Offset:
      name: offset
      in: query
      required: false
      description: Optional zero-based page offset. When omitted with limit, legacy array responses are returned for compatibility.
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    NotImplemented:
      description: Endpoint exists but is not implemented in Phase 0.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Version:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        commit:
          type: string
        date:
          type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        request_id:
          type: string
    Error:
      $ref: "#/components/schemas/ErrorResponse"
    MCPJSONRPCRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          description: JSON-RPC request id
        method:
          type: string
          description: JSON-RPC method such as initialize, resources/list, resources/read, tools/list, tools/call, prompts/list, or prompts/get.
        params:
          description: JSON-RPC method parameters.
      additionalProperties: true
    MCPJSONRPCResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          description: JSON-RPC request id
        result:
          description: JSON-RPC result payload.
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            data:
              description: Structured MCP error data.
      additionalProperties: true
