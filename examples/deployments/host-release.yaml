apiVersion: nivora.io/v1alpha1
kind: Deployment
metadata:
  name: host-release
spec:
  application: example-service
  environment: staging
  target:
    type: host
    name: staging-hosts
  artifact:
    name: example-service
    type: binary
    reference: ./dist/example-service.tar.gz
    digest: sha256:example
  host:
    deployPath: /opt/nivora/apps/example-service
    serviceName: example-service
    strategy: symlink
    healthChecks:
      - type: command
        command: /opt/nivora/apps/example-service/current/bin/healthcheck
        timeoutSeconds: 10
    batchSize: 1
    pauseOnFailure: true
    dryRun: true
