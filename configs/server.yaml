app:
  name: nivora-server
environment: local
http:
  bind_address: ":8080"
database:
  url: "postgres://nivora:nivora@localhost:5432/nivora?sslmode=disable"
event_bus:
  type: memory
object_store:
  type: local
  path: ".nivora/objectstore"
log:
  level: info
telemetry:
  enabled: false
  endpoint: ""
auth:
  enabled: false
  mode: dev
  dev_user: local-admin
  static_token_env: NIVORA_AUTH_TOKEN
  issuer: ""
runner:
  name: local-runner
  group: default
  heartbeat_interval: 30s
