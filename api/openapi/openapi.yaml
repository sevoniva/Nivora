openapi: 3.1.0
info:
  title: Nivora API
  version: 0.9.0-rc.1
  description: Hardened beta-candidate Nivora API for the DevOps delivery control plane. This surface includes foundation-level shell PipelineRun execution, controlled Kubernetes YAML DeploymentRun foundations, artifact/release binding, GitOps/Argo CD foundations, resource inventory and rollback planning, release orchestration, DevSecOps policy gates, SecretRef/Credential metadata, local auth/RBAC, approval/change-window/notification foundations, multi-cloud inventory skeletons, safe host deployment planning/noop execution, durable runner protocol foundations, backend visualization read models, lightweight observability/operations endpoints, read-only integration capability metadata, plugin capability registry metadata, and packaging assets. Nivora is not production-ready; some capabilities are experimental, foundation-only, skeleton, or placeholder-level even when their read APIs are implemented.
servers:
  - url: http://localhost:8080
security:
  - BearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Healthy
  /readyz:
    get:
      summary: Readiness check with dependency details
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "503":
          description: Critical dependency configuration is degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
  /metrics:
    get:
      summary: Lightweight local runtime metrics
      responses:
        "200":
          description: Text metrics for local development and early operations validation
          content:
            text/plain:
              schema:
                type: string
  /api/v1/version:
    get:
      summary: Version information
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
  /api/v1/system/info:
    get:
      summary: System information
      responses:
        "200":
          description: System information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
  /api/v1/system/runtime:
    get:
      summary: Runtime and telemetry information
      responses:
        "200":
          description: Runtime information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemRuntime"
  /api/v1/system/runtime/recovery:
    get:
      summary: Runtime recovery status
      responses:
        "200":
          description: Recoverable runtime work summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeRecoverySummary"
  /api/v1/system/runtime/reconcile:
    post:
      summary: Run one runtime reconciliation pass
      responses:
        "200":
          description: Reconciliation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeRecoverySummary"
  /api/v1/mcp/rpc:
    post:
      summary: Remote read-only MCP JSON-RPC endpoint
      description: Experimental remote MCP foundation. Disabled unless `mcp.enabled=true` and `mcp.mode=http`; requires bearer, service-account, or OIDC authentication; runner tokens and action tools are rejected.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MCPJSONRPCRequest"
      responses:
        "200":
          description: JSON-RPC response with resource, tool, prompt, or structured MCP error result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MCPJSONRPCResponse"
        "401":
          description: Bearer, service-account, or OIDC identity required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Runner token or forbidden identity rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Remote MCP is disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/system/diagnostics:
    get:
      summary: Runtime diagnostics
      responses:
        "200":
          description: Runtime diagnostics and local metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemDiagnostics"
  /api/v1/tenancy/quota:
    get:
      summary: View tenant quota for a scope
      parameters:
        - name: scopeType
          in: query
          schema:
            type: string
        - name: scopeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Quota for the requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantQuota"
    post:
      summary: Update tenant quota for a scope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantQuota"
      responses:
        "200":
          description: Updated quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantQuota"
  /api/v1/tenancy/usage:
    get:
      summary: View tenant usage summary for a scope
      parameters:
        - name: scopeType
          in: query
          schema:
            type: string
        - name: scopeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Usage summary for the requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantUsageSummary"
  /api/v1/audit/search:
    get:
      summary: Search structured audit records
      parameters:
        - name: subject
          in: query
          schema:
            type: string
        - name: subjectType
          in: query
          schema:
            type: string
        - name: subjectId
          in: query
          schema:
            type: string
        - name: actorId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: scopeType
          in: query
          schema:
            type: string
        - name: scopeId
          in: query
          schema:
            type: string
        - name: requestId
          in: query
          schema:
            type: string
        - name: correlationId
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Matching audit records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditSearchResult"
  /api/v1/audit/verify:
    get:
      summary: Verify tamper-evident audit hash chain
      parameters:
        - name: scopeType
          in: query
          schema:
            type: string
        - name: scopeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audit chain verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  firstBrokenId:
                    type: string
                  message:
                    type: string
  /api/v1/evidence/{subject_type}/{id}:
    get:
      summary: Export an evidence bundle for a subject
      parameters:
        - name: subject_type
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/ID"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, markdown]
      responses:
        "200":
          description: Evidence bundle as JSON or Markdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBundle"
            text/markdown:
              schema:
                type: string
  /api/v1/evidence/bundles:
    get:
      summary: List persisted evidence bundles
      parameters:
        - name: subjectType
          in: query
          schema:
            type: string
        - name: subjectId
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Evidence bundles matching the filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvidenceBundle"
                  count:
                    type: integer
    post:
      summary: Generate and persist an evidence bundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceGenerateRequest"
      responses:
        "201":
          description: Generated evidence bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBundle"
  /api/v1/evidence/bundles/{id}:
    get:
      summary: Get a persisted evidence bundle
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Evidence bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBundle"
  /api/v1/evidence/bundles/{id}/export:
    get:
      summary: Export a persisted evidence bundle
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: format
          in: query
          schema:
            type: string
            enum: [json, markdown]
      responses:
        "200":
          description: Evidence bundle as JSON or Markdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceBundle"
            text/markdown:
              schema:
                type: string
  /api/v1/retention-policy:
    get:
      summary: View retention policy for a scope
      parameters:
        - name: scopeType
          in: query
          schema:
            type: string
        - name: scopeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Retention policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
    post:
      summary: Update retention policy for a scope
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicy"
      responses:
        "200":
          description: Updated retention policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
  /api/v1/retention-policy/run:
    post:
      summary: Preview or enforce retention policy for a scope
      description: Requires `policy.manage`. Defaults to dry-run behavior; evidence bundle cleanup requires `confirm=true` and `dryRun=false`. Audit records remain immutable and are only reported as candidates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionRunRequest"
      responses:
        "200":
          description: Retention preview or guarded enforcement result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionRunResult"
  /api/v1/plugins:
    get:
      summary: List plugin manifests
      responses:
        "200":
          description: Built-in and configured plugin metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginManifest"
  /api/v1/plugins/validate:
    post:
      summary: Validate plugin manifest compatibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginManifest"
      responses:
        "200":
          description: Plugin manifest is compatible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginValidationResult"
        "400":
          description: Plugin manifest is invalid or incompatible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginValidationResult"
  /api/v1/plugins/{name}:
    get:
      summary: Get a plugin manifest
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginManifest"
        "404":
          description: Plugin not found
  /api/v1/plugins/{name}/capabilities:
    get:
      summary: Get plugin capabilities
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin capabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginCapability"
        "404":
          description: Plugin not found
  /api/v1/auth/whoami:
    get:
      summary: Show current authenticated subject
      responses:
        "200":
          description: Auth subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSubject"
  /api/v1/auth/permissions:
    get:
      summary: List known permissions
      responses:
        "200":
          description: Permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"
  /api/v1/auth/token-info:
    get:
      summary: Show token metadata without returning token values
      responses:
        "200":
          description: Token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
  /api/v1/service-accounts:
    get:
      summary: List service accounts
      responses:
        "200":
          description: Service account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceAccount"
    post:
      summary: Create a service account
      responses:
        "200":
          description: Service account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
  /api/v1/auth/tokens:
    get:
      summary: List API token metadata without token values
      responses:
        "200":
          description: API token metadata list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/APITokenMetadata"
    post:
      summary: Create an API token and return the raw token once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APITokenCreateRequest"
      responses:
        "201":
          description: API token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITokenCreateResponse"
  /api/v1/auth/tokens/{id}/rotate:
    post:
      summary: Rotate an API token and return the raw token once
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API token rotated
  /api/v1/auth/tokens/{id}/revoke:
    post:
      summary: Revoke an API token
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: API token revoked
  /api/v1/users:
    get:
      summary: List local users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /api/v1/roles:
    get:
      summary: List built-in roles
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
  /api/v1/permissions:
    get:
      summary: List built-in permissions
      responses:
        "200":
          description: Permission list
  /api/v1/orgs/{id}/members:
    get:
      summary: List organization members
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Organization memberships
    post:
      summary: Add organization member
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Membership"
      responses:
        "200":
          description: Membership created
  /api/v1/projects/{id}/members:
    get:
      summary: List project members
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Project memberships
    post:
      summary: Add project member
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Membership"
      responses:
        "200":
          description: Membership created
  /api/v1/environments/{id}/members:
    get:
      summary: List environment members
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Environment memberships
    post:
      summary: Add environment member
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Membership"
      responses:
        "200":
          description: Membership created
  /api/v1/orgs:
    get:
      summary: List organizations
      description: Lists organization catalog records. This is a foundation catalog API, not a complete tenant administration surface.
      responses:
        "200":
          description: Organization list
          content:
            application/json:
              schema:
                type: object
                properties:
                  orgs:
                    type: array
                    items:
                      $ref: "#/components/schemas/Org"
    post:
      summary: Create organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgCreateRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
  /api/v1/orgs/{id}:
    get:
      summary: Get organization
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
    patch:
      summary: Update organization
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogUpdateRequest"
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
    delete:
      summary: Disable organization
      description: Disables the organization record instead of hard-deleting it.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Organization disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Org"
  /api/v1/projects:
    get:
      summary: List projects
      parameters:
        - name: orgId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreateRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /api/v1/projects/{id}:
    get:
      summary: Get project
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    patch:
      summary: Update project
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogUpdateRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      summary: Disable project
      description: Disables the project record instead of hard-deleting it.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Project disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /api/v1/applications:
    get:
      summary: List applications
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                type: object
                properties:
                  applications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Application"
    post:
      summary: Create application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreateRequest"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
  /api/v1/applications/{id}:
    get:
      summary: Get application
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    patch:
      summary: Update application
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogUpdateRequest"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    delete:
      summary: Disable application
      description: Disables the application record instead of hard-deleting it.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Application disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
  /api/v1/environments:
    get:
      summary: List environments
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Environment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  environments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Environment"
    post:
      summary: Create environment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnvironmentCreateRequest"
      responses:
        "201":
          description: Environment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
  /api/v1/environments/{id}:
    get:
      summary: Get environment
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Environment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    patch:
      summary: Update environment
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CatalogUpdateRequest"
      responses:
        "200":
          description: Environment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
    delete:
      summary: Disable environment
      description: Disables the environment record instead of hard-deleting it.
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Environment disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Environment"
  /api/v1/release-targets:
    get:
      summary: List release targets
      description: Lists ReleaseTarget catalog records. This is metadata only and does not execute deployment, sync, rollback, or host operations.
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: environmentId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Release target list
          content:
            application/json:
              schema:
                type: object
                properties:
                  releaseTargets:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReleaseTarget"
    post:
      summary: Create release target
      description: Creates ReleaseTarget metadata with dangerous operations disabled by default.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseTargetCreateRequest"
      responses:
        "201":
          description: Release target created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseTarget"
  /api/v1/release-targets/{id}:
    get:
      summary: Get release target
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Release target
