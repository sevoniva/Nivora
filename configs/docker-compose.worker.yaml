app:
  name: nivora-worker
environment: docker-compose
http:
  bind_address: ":8081"
database:
  runtime_store: memory
  url: "postgres://nivora@postgres:5432/nivora?sslmode=disable"
event_bus:
  type: memory
object_store:
  type: local
  path: "/var/lib/nivora/objectstore"
log:
  level: info
telemetry:
  enabled: false
  endpoint: ""
mcp:
  enabled: false
  mode: stdio
  readonly: true
  allow_plan_tools: true
  allow_action_tools: false
  subject_role: viewer
  token_env: NIVORA_MCP_TOKEN
auth:
  enabled: false
  mode: dev
  dev_user: local-admin
  static_token_env: NIVORA_AUTH_TOKEN
  issuer: ""
  oidc:
    issuer: ""
    client_id: ""
    jwks_url: ""
    scopes: []
    groups_claim: groups
    username_claim: preferred_username
runner:
  name: compose-runner
  group: docker-compose
  heartbeat_interval: 30s
runtime:
  allow_local_shell_executor: true
  allow_privileged_executor: false
  allow_remote_host_deploy: false
  allow_kubernetes_apply: false
  allow_argo_sync: false
  allow_insecure_registry: false
