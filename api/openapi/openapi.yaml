openapi: 3.1.0
info:
  title: Nivora API
  version: 0.1.0-dev
  description: Early Nivora API for the DevOps delivery control plane. Phase 2.4 supports minimal shell PipelineRun execution, controlled Kubernetes YAML DeploymentRun dry-run/apply foundation, artifact/release binding, GitOps/Argo CD planning foundations, and Kubernetes resource inventory, health, snapshot, diff, and rollback-plan output.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Healthy
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Ready
  /api/v1/version:
    get:
      summary: Version information
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
  /api/v1/system/info:
    get:
      summary: System information
      responses:
        "200":
          description: System information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
  /api/v1/orgs:
    get:
      summary: Organizations placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/projects:
    get:
      summary: Projects placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/applications:
    get:
      summary: Applications placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/environments:
    get:
      summary: Environments placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/repositories:
    get:
      summary: Repositories placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/artifact-registries:
    get:
      summary: Artifact registries placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/artifacts/inspect:
    post:
      summary: Inspect and normalize an artifact reference without requiring registry access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactReference"
      responses:
        "200":
          description: Artifact inspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactInspection"
        "400":
          description: Invalid artifact reference
  /api/v1/artifacts/resolve:
    post:
      summary: Resolve immutable artifact identity when already available or supported by the provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactReference"
      responses:
        "200":
          description: Artifact resolution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResolution"
        "400":
          description: Invalid artifact reference
  /api/v1/pipelines:
    get:
      summary: Pipelines placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/pipeline-runs:
    get:
      summary: List PipelineRuns in the in-memory Phase 1.5 runtime
      responses:
        "200":
          description: PipelineRun records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineRunRecord"
    post:
      summary: Create and run a minimal shell PipelineRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineDefinition"
      responses:
        "201":
          description: PipelineRun created and executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "400":
          description: Invalid pipeline definition
  /api/v1/pipeline-runs/{id}:
    get:
      summary: Get a PipelineRun
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/logs:
    get:
      summary: Get captured PipelineRun logs
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Captured logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogChunk"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/events:
    get:
      summary: Get PipelineRun events
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/timeline:
    get:
      summary: Get ordered PipelineRun timeline entries
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEntry"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/cancel:
    post:
      summary: Cancel a pending, queued, or running PipelineRun
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "409":
          description: PipelineRun is already terminal
        "404":
          description: PipelineRun not found
  /api/v1/releases:
    get:
      summary: List Releases in the in-memory Phase 2.2 runtime
      responses:
        "200":
          description: Release records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreateReleaseResponse"
    post:
      summary: Create a Release and bind ReleaseArtifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseRequest"
      responses:
        "201":
          description: Release created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReleaseResponse"
        "400":
          description: Invalid release definition
  /api/v1/releases/{id}:
    get:
      summary: Get a Release
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Release record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReleaseResponse"
        "404":
          description: Release not found
  /api/v1/releases/{id}/artifacts:
    get:
      summary: Get ReleaseArtifact bindings for a Release
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: ReleaseArtifact bindings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReleaseArtifact"
        "404":
          description: Release not found
  /api/v1/deployments:
    get:
      summary: List DeploymentRuns in the in-memory Phase 2.1 runtime
      responses:
        "200":
          description: DeploymentRun records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeploymentRunRecord"
    post:
      summary: Create and run a non-destructive YAML DeploymentRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentDefinition"
      responses:
        "201":
          description: DeploymentRun created and dry-run validation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRunRecord"
        "400":
          description: Invalid deployment definition or manifest
  /api/v1/deployments/plan:
    post:
      summary: Render and plan a YAML DeploymentRun without persisting it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentDefinition"
      responses:
        "200":
          description: Deployment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentPlan"
        "400":
          description: Invalid deployment definition or manifest
  /api/v1/deployments/gitops/plan:
    post:
      summary: Build a GitOps change plan without requiring Argo CD or Git network access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitOpsDeploymentSpec"
      responses:
        "200":
          description: GitOps change plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitOpsChangePlan"
        "400":
          description: Invalid GitOps deployment definition
  /api/v1/deployments/gitops:
    post:
      summary: Create a GitOps DeploymentRun in safe plan mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitOpsDeploymentSpec"
      responses:
        "201":
          description: GitOps DeploymentRun created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRunRecord"
        "400":
          description: Invalid GitOps deployment definition
  /api/v1/deployments/{id}:
    get:
      summary: Get a DeploymentRun
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: DeploymentRun record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRunRecord"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/plan:
    get:
      summary: Get a DeploymentRun plan
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deployment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentPlan"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/gitops-plan:
    get:
      summary: Get a DeploymentRun GitOps change plan
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: GitOps change plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitOpsChangePlan"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/diff:
    get:
      summary: Get DeploymentRun diff summary
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Deployment diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentDiff"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/logs:
    get:
      summary: Get DeploymentRun logs
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Captured deployment logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogChunk"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/resources:
    get:
      summary: Get DeploymentRun resource inventory
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: DeploymentRun resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeploymentResource"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/health:
    get:
      summary: Get DeploymentRun resource health evaluation
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Resource health evaluation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEvaluation"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/manifest-snapshot:
    get:
      summary: Get DeploymentRun manifest snapshot
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Manifest snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManifestSnapshot"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/rollback-plan:
    get:
      summary: Get non-destructive DeploymentRun rollback plan
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Rollback plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RollbackPlan"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/events:
    get:
      summary: Get DeploymentRun events
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: DeploymentRun events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/timeline:
    get:
      summary: Get ordered DeploymentRun timeline entries
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: DeploymentRun timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEntry"
        "404":
          description: DeploymentRun not found
  /api/v1/deployments/{id}/cancel:
    post:
      summary: Cancel a non-terminal DeploymentRun
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: DeploymentRun canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRunRecord"
        "409":
          description: DeploymentRun is already terminal
        "404":
          description: DeploymentRun not found
  /api/v1/runners:
    get:
      summary: List registered runners in the in-memory Phase 1.5 runtime
      responses:
        "200":
          description: Runner records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Runner"
  /api/v1/runners/register:
    post:
      summary: Register a minimal runner record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Runner"
      responses:
        "201":
          description: Runner registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"
  /api/v1/runners/{id}:
    get:
      summary: Get a runner
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Runner record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"
        "404":
          description: Runner not found
  /api/v1/runners/{id}/heartbeat:
    post:
      summary: Record a runner heartbeat
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Updated runner record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Runner"
        "404":
          description: Runner not found
  /api/v1/approvals:
    get:
      summary: Approvals placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/policies:
    get:
      summary: Policies placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/audit-logs:
    get:
      summary: Audit logs placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/events:
    get:
      summary: Events placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/logs:
    get:
      summary: Logs placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/integrations:
    get:
      summary: Integrations placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/visualization:
    get:
      summary: Visualization placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    NotImplemented:
      description: Endpoint exists but is not implemented in Phase 0.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Version:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        commit:
          type: string
        date:
          type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        request_id:
          type: string
    Error:
      $ref: "#/components/schemas/ErrorResponse"
    SystemInfo:
      type: object
      properties:
        app:
          type: string
        environment:
          type: string
        event_bus:
          type: string
        object_store:
          type: string
        runtime_mode:
          type: string
    ArtifactReference:
      type: object
      required: [reference]
      properties:
        reference:
          type: string
        type:
          type: string
          enum: [image, jar, binary, chart, yaml, tar, npm, maven, unknown]
    ArtifactWarning:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          type: string
    ArtifactInspection:
      type: object
      properties:
        reference:
          type: object
          properties:
            type:
              type: string
            original:
              type: string
            normalized:
              type: string
            registry:
              type: string
            repository:
              type: string
            name:
              type: string
            version:
              type: string
            tag:
              type: string
            digest:
              type: string
            scheme:
              type: string
            immutable:
              type: boolean
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactWarning"
    ArtifactResolution:
      type: object
      properties:
        reference:
          type: object
        digest:
          type: string
        resolved:
          type: boolean
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactWarning"
    Artifact:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        name:
          type: string
        version:
          type: string
        reference:
          type: string
        digest:
          type: string
        registry:
          type: string
        repository:
          type: string
        mediaType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        metadata:
          type: object
          additionalProperties:
            type: string
    Release:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        applicationId:
          type: string
        environmentId:
          type: string
        sourcePipelineRunId:
          type: string
        commit:
          type: string
        status:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    ReleaseArtifact:
      type: object
      properties:
        id:
          type: string
        releaseId:
          type: string
        artifactId:
          type: string
        name:
          type: string
        type:
          type: string
        role:
          type: string
        required:
          type: boolean
        reference:
          type: string
        digest:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    CreateReleaseRequest:
      type: object
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum: [Release]
        metadata:
          type: object
          required: [name]
          properties:
            name:
              type: string
        spec:
          type: object
          required: [version, artifacts]
          properties:
            version:
              type: string
            application:
              type: string
            environment:
              type: string
            sourcePipelineRunId:
              type: string
            commit:
              type: string
            artifacts:
              type: array
              items:
                type: object
                required: [name, type, reference]
                properties:
                  name:
                    type: string
                  type:
                    type: string
                  role:
                    type: string
                  required:
                    type: boolean
                  reference:
                    type: string
                  metadata:
                    type: object
                    additionalProperties:
                      type: string
    CreateReleaseResponse:
      type: object
      properties:
        release:
          $ref: "#/components/schemas/Release"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/Artifact"
        bindings:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseArtifact"
        inspections:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactInspection"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactWarning"
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        audits:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
    PipelineRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pipelineId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Pending, Queued, Running, Paused, Succeeded, Failed, Canceled, Timeout]
        failureReason:
          type: string
    PipelineDefinition:
      type: object
      required: [apiVersion, kind, metadata, spec]
      properties:
        apiVersion:
          type: string
        kind:
          type: string
          enum: [Pipeline]
        metadata:
          type: object
          required: [name]
          properties:
            name:
              type: string
        spec:
          $ref: "#/components/schemas/PipelineSpec"
    PipelineSpec:
      type: object
      required: [stages]
      properties:
        timeoutSeconds:
          type: integer
          minimum: 0
        stages:
          type: array
          items:
            type: object
            required: [name, jobs]
            properties:
              name:
                type: string
              jobs:
                type: array
                items:
                  type: object
                  required: [name, executor, steps]
                  properties:
                    name:
                      type: string
                    executor:
                      type: string
                      enum: [shell]
                    retries:
                      type: integer
                      minimum: 0
                    timeoutSeconds:
                      type: integer
                      minimum: 0
                    steps:
                      type: array
                      items:
                        type: object
                        required: [run]
                        properties:
                          name:
                            type: string
                          run:
                            type: string
                          timeoutSeconds:
                            type: integer
                            minimum: 0
    PipelineRunRecord:
      type: object
      properties:
        pipeline:
          type: object
        run:
          $ref: "#/components/schemas/PipelineRun"
        stages:
          type: array
          items:
            $ref: "#/components/schemas/StageRun"
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogChunk"
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
    StageRun:
      type: object
      properties:
        stage:
          type: object
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/JobRun"
    JobRun:
      type: object
      properties:
        job:
          type: object
        steps:
          type: array
          items:
            $ref: "#/components/schemas/StepRun"
    StepRun:
      type: object
      properties:
        id:
          type: string
        jobRunId:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [Pending, Assigned, Running, Succeeded, Failed, Skipped, Retrying, Canceled]
        attempt:
          type: integer
        failureReason:
          type: string
    LogChunk:
      type: object
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        deploymentRunId:
          type: string
        stageRunId:
          type: string
        jobRunId:
          type: string
        stepRunId:
          type: string
