      summary: Restore a saved pipeline definition version
      description: Restores an older saved Pipeline definition version as a new current catalog version. This mutates catalog metadata only and does not execute a PipelineRun.
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineDefinitionRollbackRequest"
      responses:
        "200":
          description: Pipeline definition restored as a new current version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineDefinitionRecord"
        "400":
          description: Invalid rollback target
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
