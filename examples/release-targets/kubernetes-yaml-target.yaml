apiVersion: nivora.io/v1alpha1
kind: ReleaseTarget
metadata:
  name: dev-yaml
spec:
  projectId: example-project
  environmentId: example-dev
  targetType: kubernetes-yaml
  context: kube-context-placeholder
  namespace: default
  configRef: kube-target-config-placeholder
  credentialRef: kube-credential-placeholder
  allowApply: false
  allowSync: false
  allowRemoteHostDeploy: false
  enabled: true
  labels:
    tier: dev
