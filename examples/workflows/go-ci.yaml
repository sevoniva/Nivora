apiVersion: nivora.io/v1alpha1
kind: Workflow
metadata:
  name: go-ci
  labels:
    example: "true"
on:
  - manual
  - push
permissions:
  contents: read
  artifacts: write
  deployments: plan
jobs:
  test:
    runsOn:
      - self-hosted
      - shell
    steps:
      - name: test
        run: go test ./...
  build:
    needs:
      - test
    runsOn:
      - self-hosted
      - shell
    steps:
      - name: build
        run: go build ./cmd/nivora
artifacts:
  - name: nivora-binary
    path: dist/nivora
    type: binary
    retentionDays: 7
cache:
  - key: go-mod
    path:
      - go.mod
      - go.sum
    restoreKeys:
      - go-mod-main
    scope: project
security:
  scanners:
    - noop
  required: false
release:
  name: nivora-dev
  environment: dev
  artifacts:
    - nivora-binary
  requireDigest: false
deployment:
  targetType: kubernetes-yaml
  targetName: dev-yaml
  environment: dev
  apply: false
