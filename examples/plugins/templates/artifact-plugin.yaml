apiVersion: nivora.io/plugin/v1alpha1
name: example-artifact-plugin
type: artifact
version: 0.1.0
protocol: http
endpoint: https://plugins.example.invalid/artifact
capabilities:
  - name: artifact.inspect
    description: Inspect artifact references without returning credentials.
  - name: artifact.resolve_digest
    description: Resolve immutable artifact identity when configured.
compatibility:
  pluginApiVersion: v1alpha1
  nivoraMinVersion: 0.1.0-alpha.1
  protocols:
    - http
lifecycle:
  health: true
  capabilities: true
  validateConfig: true
  execute: true
status: external
metadata:
  template: "true"
