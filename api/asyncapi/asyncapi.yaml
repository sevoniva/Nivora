        $ref: "#/components/messages/Event"
  devops.deployment.failed:
    address: devops.deployment.failed
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.canceled:
    address: devops.deployment.canceled
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.approval.required:
    address: devops.deployment.approval.required
    description: Reserved for future approval phases; not emitted by the Phase 2.0 dry-run runtime.
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.rollback.started:
    address: devops.deployment.rollback.started
    description: Reserved for future rollback phases; not emitted by the Phase 2.0 dry-run runtime.
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.rollback.succeeded:
    address: devops.deployment.rollback.succeeded
    description: Reserved for future rollback phases; not emitted by the Phase 2.0 dry-run runtime.
    messages:
      event:
