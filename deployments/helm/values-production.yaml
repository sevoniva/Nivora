# Production-like profile for validation and operator review.
# Nivora is still a beta-candidate foundation; this file avoids unsafe defaults
# but does not make the chart production-ready by itself.

image:
  repository: sevoniva/nivora
  tag: "0.9.0-beta-candidate"
  pullPolicy: IfNotPresent

server:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

runner:
  enabled: true
  replicas: 1
  name: production-runner
  group: default
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

config:
  environment: production
  runtimeStore: postgres
  databaseURL: "postgres://nivora@postgres.example.internal:5432/nivora?sslmode=require"
  eventBusType: memory
  objectStoreType: local
  objectStorePath: /var/lib/nivora/objectstore
  logLevel: info
  telemetryEnabled: false
  telemetryEndpoint: ""
  auth:
    enabled: true
    mode: token
    devUser: ""
    staticTokenEnv: NIVORA_AUTH_TOKEN
    oidc:
      issuer: ""
      clientId: ""
      jwksUrl: ""
      groupsClaim: groups
      usernameClaim: preferred_username
  runtime:
    allowLocalShellExecutor: false
    allowPrivilegedExecutor: false
    allowRemoteHostDeploy: false
    allowKubernetesApply: false
    allowArgoSync: false
    allowInsecureRegistry: false

secret:
  create: false
  existingName: nivora-production-secret
  stringData: {}

persistence:
  enabled: true
  size: 10Gi
  storageClassName: ""

ingress:
  enabled: false

migration:
  enabled: false
  image:
    repository: sevoniva/nivora-migrations
    tag: "0.9.0-beta-candidate"
    pullPolicy: IfNotPresent
  command: []
  args: []
