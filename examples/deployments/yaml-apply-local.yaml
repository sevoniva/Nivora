apiVersion: nivora.io/v1alpha1
kind: Deployment
metadata:
  name: demo-yaml-apply-local
spec:
  application: demo-springboot
  environment: dev
  target:
    type: kubernetes-yaml
    name: local-noop
    namespace: default
  artifacts:
    - name: demo-springboot
      type: image
      reference: example.invalid/sevoniva/demo-springboot:example
  manifests:
    - examples/yaml/configmap.yaml
    - examples/yaml/deployment.yaml
    - examples/yaml/service.yaml
  options:
    dryRun: false
    apply: true
    wait: true
    timeoutSeconds: 120
