name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  GOPROXY: https://proxy.golang.org,direct

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: azure/setup-helm@v5
      - name: Check formatting
        run: make fmt-check
      - name: Check go mod tidy
        run: make tidy-check
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build binaries
        run: make build
      - name: Build web UI
        run: make verify-web
      - name: Verify architecture boundaries
        run: make verify-architecture
      - name: Verify no committed secrets
        run: make verify-no-secrets
      - name: Validate examples and migrations
        run: make verify-examples
      - name: Verify local runtime smoke paths
        run: make verify-runtime verify-api verify-cli verify-deployment verify-release verify-security verify-host
      - name: Verify API specs
        run: make verify-api-specs
      - name: Verify MCP control plane
        run: make verify-mcp
      - name: Verify packaging templates
        run: make verify-packaging
      - name: Verify Helm safety
        run: make verify-helm-safety
      - name: Verify alpha release docs
        run: make verify-alpha

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nivora
          POSTGRES_PASSWORD: nivora
          POSTGRES_DB: nivora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      GOPROXY: https://proxy.golang.org,direct
      DATABASE_URL: "postgres://nivora:nivora@localhost:5432/nivora?sslmode=disable"
      NIVORA_RUN_POSTGRES_INTEGRATION: "true"
      CI: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - name: Run migration up/down integration tests
        run: go test -p 1 -count=1 -run 'TestPostgresIntegration' ./internal/adapters/repository/postgres ./internal/app/runtime
      - name: Run targeted Postgres store tests
        run: go test -p 1 -count=1 -run 'TestPostgres' ./internal/adapters/repository/postgres/...
      - name: Audit hash chain verification
        run: go test -p 1 -count=1 -run 'TestPostgresIntegrationAuditHashChain' ./internal/adapters/repository/postgres
      - name: MCP audit hash chain verification
        run: go test -p 1 -count=1 -run 'TestPostgresIntegrationMCPAuditHashChain' ./internal/api/mcp
      - name: Live deploy smoke
        run: make smoke-live-deploy
      - name: Multi-process recovery smoke
        run: make smoke-multiprocess-recovery
