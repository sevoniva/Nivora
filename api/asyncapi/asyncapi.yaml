    address: devops.pipeline.run.created
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.pipeline.run.queued:
    address: devops.pipeline.run.queued
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.pipeline.run.started:
    address: devops.pipeline.run.started
    messages:
