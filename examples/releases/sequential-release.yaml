apiVersion: nivora.io/v1alpha1
kind: ReleaseOrchestration
metadata:
  name: demo-sequential-release
spec:
  environment: dev
  strategy: sequential
  continueOnFailure: false
  release:
    apiVersion: nivora.io/v1alpha1
    kind: Release
    metadata:
      name: demo-springboot
    spec:
      version: 1.0.0
      application: demo-springboot
      environment: dev
      artifacts:
        - name: demo-springboot
          type: image
          role: application
          required: true
          reference: registry.example.com/demo/demo-springboot:1.0.0
  targets:
    - name: dev-yaml
      type: kubernetes-yaml
      order: 1
      deployment:
        apiVersion: nivora.io/v1alpha1
        kind: Deployment
        metadata:
          name: demo-yaml-sequential
        spec:
          application: demo-springboot
          environment: dev
          target:
            type: kubernetes-yaml
            name: dev-yaml
            namespace: default
          artifacts:
            - name: demo-springboot
              type: image
              reference: registry.example.com/demo/demo-springboot:1.0.0
          manifests:
            - examples/yaml/deployment.yaml
            - examples/yaml/service.yaml
          options:
            dryRun: true
            apply: false
    - name: audit-only
      type: noop
      order: 2
      deployment: {}
