  devops.deployment.created:
    address: devops.deployment.created
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.planning:
    address: devops.deployment.planning
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.precheck.started:
    address: devops.deployment.precheck.started
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.precheck.completed:
    address: devops.deployment.precheck.completed
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.deployment.dryrun.started:
    address: devops.deployment.dryrun.started
    messages:
