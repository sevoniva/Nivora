name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GOPROXY: https://proxy.golang.org,direct

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -path './.git' -prune -o -name '*.go' -print))"
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build binaries
        run: |
          go build ./cmd/nivora-server
          go build ./cmd/nivora-worker
          go build ./cmd/nivora-runner
          go build ./cmd/nivora
      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run typecheck
          npm run build
      - name: Verify architecture boundaries
        run: ./scripts/verify-architecture.sh
      - name: Verify no committed secrets
        run: ./scripts/verify-no-secrets.sh
