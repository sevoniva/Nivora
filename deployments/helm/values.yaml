image:
  repository: sevoniva/nivora
  tag: "0.9.0-rc.1"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

server:
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources: {}

worker:
  replicas: 1
  resources: {}

runner:
  enabled: true
  replicas: 1
  name: helm-runner
  group: default
  resources: {}

config:
  environment: development
  runtimeStore: memory
  databaseURL: "postgres://nivora@postgres:5432/nivora?sslmode=disable"
  eventBusType: memory
  objectStoreType: local
  objectStorePath: /var/lib/nivora/objectstore
  logLevel: info
  telemetryEnabled: false
  telemetryEndpoint: ""
  auth:
    enabled: true
    mode: token
    devUser: ""
    staticTokenEnv: NIVORA_AUTH_TOKEN
    oidc:
      issuer: ""
      clientId: ""
      jwksUrl: ""
      groupsClaim: groups
      usernameClaim: preferred_username
  runtime:
    allowLocalShellExecutor: false
    allowPrivilegedExecutor: false
    allowRemoteHostDeploy: false
    allowKubernetesApply: false
    allowArgoSync: false
    allowInsecureRegistry: false
    runnerIsolationProfile: "shell-hardened"
    allowDockerSocketMount: false
    allowHostPathMount: false

secret:
  create: true
  existingName: ""
  stringData: {}
  # Example only; do not commit real values:
  # stringData:
  #   NIVORA_AUTH_TOKEN: "<set-at-install-time>"

persistence:
  enabled: false
  size: 1Gi
  storageClassName: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nivora.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

migration:
  enabled: false
  image:
    repository: sevoniva/nivora-migrations
    tag: "0.9.0-rc.1"
    pullPolicy: IfNotPresent
  command: []
  args: []
