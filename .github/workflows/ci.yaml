name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  GOPROXY: https://proxy.golang.org,direct

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: azure/setup-helm@v4
      - name: Check formatting
        run: make fmt-check
      - name: Check go mod tidy
        run: make tidy-check
      - name: Vet
        run: make vet
      - name: Test
        run: make test
      - name: Build binaries
        run: make build
      - name: Build web UI
        run: make verify-web
      - name: Verify architecture boundaries
        run: make verify-architecture
      - name: Verify no committed secrets
        run: make verify-no-secrets
      - name: Validate examples and migrations
        run: make verify-examples
      - name: Verify local runtime smoke paths
        run: make verify-runtime verify-api verify-cli verify-deployment verify-release verify-security verify-host
      - name: Verify API specs
        run: make verify-api-specs
      - name: Verify packaging templates
        run: make verify-packaging
      - name: Verify alpha release docs
        run: make verify-alpha
