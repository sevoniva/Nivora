components:
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    NotImplemented:
      description: Endpoint exists but is not implemented in Phase 0.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    Version:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        commit:
          type: string
        date:
          type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        path:
          type: string
        request_id:
          type: string
    Error:
      $ref: "#/components/schemas/ErrorResponse"
    ApprovalCreateRequest:
      type: object
      required: [subjectType, subjectId]
      properties:
        subjectType:
          type: string
          enum: [release, deployment, pipeline]
        subjectId:
          type: string
        environmentId:
          type: string
        requiredByPolicy:
          type: boolean
        requestedBy:
          type: string
        reason:
          type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalParticipant"
    ApprovalDecisionRequest:
      type: object
      properties:
        approver:
          type: string
        comment:
          type: string
    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
        subjectType:
          type: string
          enum: [release, deployment, pipeline]
        subjectId:
          type: string
        environmentId:
          type: string
        requiredByPolicy:
          type: boolean
        status:
          type: string
          enum: [Pending, Approved, Rejected, Canceled, Expired]
        requestedBy:
          type: string
        requestedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        reason:
          type: string
        participants:
          type: array
          items:
