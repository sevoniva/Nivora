openapi: 3.1.0
info:
  title: Nivora API
  version: 0.1.0-alpha.1
  description: Alpha Nivora API for the DevOps delivery control plane. The v0.1.0-alpha.1 surface supports foundation-level shell PipelineRun execution, controlled Kubernetes YAML DeploymentRun foundations, artifact/release binding, GitOps/Argo CD foundations, resource inventory and rollback planning, release orchestration, DevSecOps policy gates, SecretRef/Credential metadata, local auth/RBAC, approval/change-window/notification foundations, multi-cloud inventory foundations, safe host deployment planning/noop execution, durable runner protocol foundations, backend visualization read models, lightweight observability/operations endpoints, plugin capability registry metadata, and packaging assets. It is not production-ready.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Healthy
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Ready
  /metrics:
    get:
      summary: Lightweight local runtime metrics
      responses:
        "200":
          description: Text metrics for local development and early operations validation
          content:
            text/plain:
              schema:
                type: string
  /api/v1/version:
    get:
      summary: Version information
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
  /api/v1/system/info:
    get:
      summary: System information
      responses:
        "200":
          description: System information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
  /api/v1/system/runtime:
    get:
      summary: Runtime and telemetry information
      responses:
        "200":
          description: Runtime information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemRuntime"
  /api/v1/system/runtime/recovery:
    get:
      summary: Runtime recovery status
      responses:
        "200":
          description: Recoverable runtime work summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeRecoverySummary"
  /api/v1/system/runtime/reconcile:
    post:
      summary: Run one runtime reconciliation pass
      responses:
        "200":
          description: Reconciliation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeRecoverySummary"
  /api/v1/system/diagnostics:
    get:
      summary: Runtime diagnostics
      responses:
        "200":
          description: Runtime diagnostics and local metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemDiagnostics"
  /api/v1/plugins:
    get:
      summary: List plugin manifests
      responses:
        "200":
          description: Built-in and configured plugin metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginManifest"
  /api/v1/plugins/{name}:
    get:
      summary: Get a plugin manifest
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginManifest"
        "404":
          description: Plugin not found
  /api/v1/plugins/{name}/capabilities:
    get:
      summary: Get plugin capabilities
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plugin capabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PluginCapability"
        "404":
          description: Plugin not found
  /api/v1/auth/whoami:
    get:
      summary: Show current authenticated subject
      responses:
        "200":
          description: Auth subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSubject"
  /api/v1/auth/permissions:
    get:
      summary: List known permissions
      responses:
        "200":
          description: Permission list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Permission"
  /api/v1/auth/token-info:
    get:
      summary: Show token metadata without returning token values
      responses:
        "200":
          description: Token metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenMetadata"
  /api/v1/users:
    get:
      summary: List local users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /api/v1/roles:
    get:
      summary: List built-in roles
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
  /api/v1/permissions:
    get:
      summary: List built-in permissions
      responses:
        "200":
          description: Permission list
  /api/v1/orgs/{id}/members:
    get:
      summary: List organization members
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Organization memberships
    post:
      summary: Add organization member
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Membership"
      responses:
        "200":
          description: Membership created
  /api/v1/projects/{id}/members:
    get:
      summary: List project members
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Project memberships
    post:
      summary: Add project member
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Membership"
      responses:
        "200":
          description: Membership created
  /api/v1/orgs:
    get:
      summary: Organizations placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/projects:
    get:
      summary: Projects placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/applications:
    get:
      summary: Applications placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/environments:
    get:
      summary: Environments placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/repositories:
    get:
      summary: Repositories placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/artifact-registries:
    get:
      summary: Artifact registries placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/artifact-registries/validate:
    post:
      summary: Validate generic OCI artifact registry configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OCIRegistryConfig"
      responses:
        "200":
          description: Registry configuration shape is valid
        "400":
          description: Invalid registry configuration
  /api/v1/artifacts/inspect:
    post:
      summary: Inspect and normalize an artifact reference without requiring registry access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactReference"
      responses:
        "200":
          description: Artifact inspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactInspection"
        "400":
          description: Invalid artifact reference
  /api/v1/artifacts/resolve:
    post:
      summary: Resolve an OCI artifact digest when already pinned or when registry access is configured
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactReference"
      responses:
        "200":
          description: Artifact resolution result
  /api/v1/security/scans:
    post:
      summary: Create a security scan using the configured scanner foundation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecurityScanRequest"
      responses:
        "201":
          description: Security scan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityScanRecord"
  /api/v1/security/scans/{id}:
    get:
      summary: Get a security scan
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Security scan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityScanRecord"
  /api/v1/security/scans/{id}/findings:
    get:
      summary: Get security scan findings
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Security findings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityFinding"
  /api/v1/releases/{id}/security:
    get:
      summary: Get release security gate output from latest ReleasePlan
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Release security output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityScanRecord"
  /api/v1/deployments/{id}/security:
    get:
      summary: Get DeploymentRun security gate output
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: DeploymentRun security output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityScanRecord"
  /api/v1/policies/evaluate:
    post:
      summary: Evaluate built-in policy gate rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyEvaluationRequest"
      responses:
        "200":
          description: Policy result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyResult"
        "400":
          description: Invalid policy evaluation request
  /api/v1/secrets:
    post:
      summary: Store a secret value and return SecretRef metadata only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecretCreateRequest"
      responses:
        "200":
          description: SecretRef metadata. The secret value is never returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretRef"
  /api/v1/secrets/refs:
    get:
      summary: List SecretRef metadata
      responses:
        "200":
          description: Secret references without values
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecretRef"
  /api/v1/secrets/{id}:
    delete:
      summary: Delete a secret by id
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Secret deleted
  /api/v1/credentials:
    get:
      summary: List credential metadata
      responses:
        "200":
          description: Credential metadata records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Credential"
    post:
      summary: Create credential metadata bound to a SecretRef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialCreateRequest"
      responses:
        "200":
          description: Credential metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
  /api/v1/credentials/{id}:
    get:
      summary: Get credential metadata
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Credential metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential"
    delete:
      summary: Delete credential metadata
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Credential deleted
  /api/v1/credentials/{id}/validate:
    post:
      summary: Validate that credential SecretRef can be resolved internally
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Credential validation result without secret value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialValidationResult"
  /api/v1/pipelines:
    get:
      summary: Pipelines placeholder
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v1/pipeline-runs:
    get:
      summary: List PipelineRuns in the in-memory Phase 1.5 runtime
      responses:
        "200":
          description: PipelineRun records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineRunRecord"
    post:
      summary: Create and run a minimal shell PipelineRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineDefinition"
      responses:
        "201":
          description: PipelineRun created and executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "400":
          description: Invalid pipeline definition
  /api/v1/pipeline-runs/{id}:
    get:
      summary: Get a PipelineRun
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/logs:
    get:
      summary: Get captured PipelineRun logs
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Captured logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogChunk"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/events:
    get:
      summary: Get PipelineRun events
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/timeline:
    get:
      summary: Get ordered PipelineRun timeline entries
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun timeline
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEntry"
        "404":
          description: PipelineRun not found
  /api/v1/pipeline-runs/{id}/cancel:
    post:
      summary: Cancel a pending, queued, or running PipelineRun
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: PipelineRun canceled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "409":
          description: PipelineRun is already terminal
        "404":
          description: PipelineRun not found
  /api/v1/releases:
    get:
      summary: List Releases in the in-memory Phase 2.2 runtime
      responses:
        "200":
          description: Release records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreateReleaseResponse"
    post:
      summary: Create a Release and bind ReleaseArtifacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReleaseRequest"
      responses:
        "201":
          description: Release created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReleaseResponse"
        "400":
          description: Invalid release definition
  /api/v1/releases/{id}:
    get:
      summary: Get a Release
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Release record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateReleaseResponse"
        "404":
          description: Release not found
  /api/v1/releases/{id}/artifacts:
    get:
      summary: Get ReleaseArtifact bindings for a Release
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: ReleaseArtifact bindings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReleaseArtifact"
        "404":
          description: Release not found
  /api/v1/releases/{id}/plan:
    post:
      summary: Create a multi-target ReleasePlan
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseOrchestrationDefinition"
      responses:
        "200":
          description: ReleasePlan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleasePlanRecord"
    get:
      summary: Get the latest ReleasePlan for a Release
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Latest ReleasePlan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleasePlanRecord"
  /api/v1/releases/{id}/deploy:
    post:
      summary: Create a ReleaseExecution across selected targets
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseOrchestrationDefinition"
      responses:
        "201":
          description: ReleaseExecution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseExecutionRecord"
  /api/v1/releases/{id}/executions:
    get:
      summary: List ReleaseExecutions for a Release
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: ReleaseExecutions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReleaseExecutionRecord"
  /api/v1/releases/executions/{execution_id}:
    get:
      summary: Get a ReleaseExecution
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ReleaseExecution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseExecutionRecord"
  /api/v1/releases/executions/{execution_id}/timeline:
    get:
      summary: Get aggregate ReleaseExecution timeline
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Timeline entries
  /api/v1/releases/executions/{execution_id}/targets:
    get:
      summary: Get ReleaseExecution target status
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Target executions
  /api/v1/releases/executions/{execution_id}/cancel:
    post:
      summary: Cancel a ReleaseExecution
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ReleaseExecution canceled
  /api/v1/deployments:
    get:
      summary: List DeploymentRuns in the in-memory Phase 2.1 runtime
      responses:
        "200":
          description: DeploymentRun records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeploymentRunRecord"
    post:
      summary: Create and run a non-destructive YAML DeploymentRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentDefinition"
      responses:
        "201":
          description: DeploymentRun created and dry-run validation completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRunRecord"
        "400":
          description: Invalid deployment definition or manifest
  /api/v1/deployments/plan:
    post:
      summary: Render and plan a YAML DeploymentRun without persisting it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentDefinition"
      responses:
        "200":
          description: Deployment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentPlan"
        "400":
          description: Invalid deployment definition or manifest
  /api/v1/deployments/gitops/plan:
    post:
      summary: Build a GitOps change plan without requiring Argo CD or Git network access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitOpsDeploymentSpec"
      responses:
        "200":
          description: GitOps change plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitOpsChangePlan"
        "400":
          description: Invalid GitOps deployment definition
  /api/v1/deployments/gitops:
    post:
      summary: Create a GitOps DeploymentRun in safe plan mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GitOpsDeploymentSpec"
      responses:
        "201":
          description: GitOps DeploymentRun created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentRunRecord"
        "400":
          description: Invalid GitOps deployment definition
  /api/v1/host-groups:
    get:
      summary: List host groups
      responses:
        "200":
          description: Host groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HostGroup"
    post:
      summary: Create a host group metadata record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostGroup"
      responses:
        "200":
          description: Host group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostGroup"
  /api/v1/host-groups/{id}:
    get:
      summary: Get a host group
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Host group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostGroup"
        "404":
          description: Host group not found
  /api/v1/deployments/host/plan:
    post:
      summary: Build a safe host deployment plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentDefinition"
      responses:
        "200":
          description: Host deployment plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostDeploymentPlan"
        "400":
          description: Invalid host deployment definition
  /api/v1/integrations/argocd/applications/{name}/status:
    get:
      summary: Read modeled Argo CD application status
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Argo CD application status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArgoCDApplicationStatus"
  /api/v1/integrations/argocd/applications/{name}/resources:
    get:
      summary: Read modeled Argo CD application resources
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Argo CD application resources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArgoCDResourceStatus"
  /api/v1/integrations/argocd/applications/{name}/sync:
    post:
      summary: Request guarded Argo CD sync
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArgoCDSyncRequest"
      responses:
        "200":
          description: Sync request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArgoCDSyncResult"
        "400":
          description: Sync disabled or invalid sync request
