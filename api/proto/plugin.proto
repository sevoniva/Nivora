syntax = "proto3";

package nivora.plugin.v1alpha1;

option go_package = "github.com/sevoniva/nivora/api/proto/plugin;pluginv1alpha1";

// PluginService is a Phase 4.3 protocol skeleton.
//
// Nivora does not dynamically load Go plugins. Future external adapters may
// expose a separate process that implements this protocol or an equivalent
// HTTP contract behind explicit configuration.
service PluginService {
  rpc Health(PluginHealthRequest) returns (PluginHealthResponse);
  rpc Capabilities(PluginCapabilitiesRequest) returns (PluginCapabilitiesResponse);
  rpc Execute(PluginExecuteRequest) returns (PluginExecuteResponse);
}

message PluginHealthRequest {}

message PluginHealthResponse {
  string status = 1;
  string message = 2;
}

message PluginCapabilitiesRequest {}

message PluginCapabilitiesResponse {
  PluginManifest manifest = 1;
}

message PluginManifest {
  string name = 1;
  string type = 2;
  string version = 3;
  string protocol = 4;
  string endpoint = 5;
  repeated PluginCapability capabilities = 6;
  string status = 7;
  map<string, string> metadata = 8;
}

message PluginCapability {
  string name = 1;
  string description = 2;
  repeated string inputs = 3;
  repeated string outputs = 4;
  map<string, string> metadata = 5;
}

message PluginExecuteRequest {
  string capability = 1;
  string request_id = 2;
  string correlation_id = 3;
  bytes payload = 4;
}

message PluginExecuteResponse {
  string status = 1;
  bytes payload = 2;
  string message = 3;
}
