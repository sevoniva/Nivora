components:
  messages:
    Event:
      name: Event
      payload:
        $ref: "#/components/schemas/EventEnvelope"
  schemas:
    EventEnvelope:
      type: object
      required: [specversion, id, type, source, time, datacontenttype, data]
      properties:
        specversion:
          type: string
          example: "1.0"
        id:
          type: string
        type:
          type: string
        source:
          type: string
        subject:
          type: string
        time:
          type: string
          format: date-time
        datacontenttype:
          type: string
          example: application/json
        data:
          type: object
