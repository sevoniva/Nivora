          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Saved Pipeline definition version number to run.
        - name: environmentId
          in: query
          required: false
          schema:
            type: string
          description: Environment ownership to attach to the created PipelineRun; environment-scoped callers are constrained to their own environment.
      responses:
        "201":
          description: PipelineRun created from saved definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineRunRecord"
        "409":
