apiVersion: nivora.io/v1alpha1
kind: Deployment
metadata:
  name: yaml-apply
spec:
  application: example-service
  environment: staging
  target:
    type: kubernetes-yaml
    name: staging-cluster
    namespace: default
  manifests:
    - examples/yaml/deployment.yaml
    - examples/yaml/service.yaml
  options:
    dryRun: true
    apply: false
