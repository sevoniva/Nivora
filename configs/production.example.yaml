app:
  name: nivora
environment: production
http:
  bind_address: ":8080"
database:
  runtime_store: postgres
  url: "postgres://nivora@postgres.example.internal:5432/nivora?sslmode=require"
event_bus:
  type: memory
object_store:
  type: local
  path: "/var/lib/nivora/objectstore"
log:
  level: info
telemetry:
  enabled: false
  endpoint: ""
auth:
  enabled: true
  mode: token
  dev_user: ""
  static_token_env: NIVORA_AUTH_TOKEN
  issuer: ""
  oidc:
    issuer: ""
    client_id: ""
    jwks_url: ""
    scopes: []
    groups_claim: groups
    username_claim: preferred_username
runner:
  name: production-runner
  group: default
  heartbeat_interval: 30s
runtime:
  allow_local_shell_executor: false
  allow_privileged_executor: false
  allow_remote_host_deploy: false
  allow_kubernetes_apply: false
  allow_argo_sync: false
  allow_insecure_registry: false
  runner_isolation_profile: container-isolated
  allow_docker_socket_mount: false
  allow_host_path_mount: false
