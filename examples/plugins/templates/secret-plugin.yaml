apiVersion: nivora.io/plugin/v1alpha1
name: example-secret-plugin
type: secret
version: 0.1.0
protocol: http
endpoint: https://plugins.example.invalid/secret
capabilities:
  - name: secret.resolve_ref
    description: Resolve SecretRef values only inside trusted adapter boundaries.
compatibility:
  pluginApiVersion: v1alpha1
  nivoraMinVersion: 0.1.0-alpha.1
  protocols:
    - http
lifecycle:
  health: true
  capabilities: true
  validateConfig: true
  execute: true
status: external
metadata:
  template: "true"
