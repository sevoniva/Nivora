services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nivora
      POSTGRES_PASSWORD: nivora
      POSTGRES_DB: nivora
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nivora -d nivora"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nivora
      MINIO_ROOT_PASSWORD: nivora-dev-only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  nivora-server:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NIVORA_BINARY: nivora-server
    command: ["/etc/nivora/server.yaml"]
    ports:
      - "8080:8080"
    volumes:
      - ../../configs:/etc/nivora:ro
    depends_on:
      postgres:
        condition: service_healthy

  nivora-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NIVORA_BINARY: nivora-worker
    command: ["/etc/nivora/worker.yaml"]
    volumes:
      - ../../configs:/etc/nivora:ro
    depends_on:
      postgres:
        condition: service_healthy

  nivora-runner:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        NIVORA_BINARY: nivora-runner
    command: ["/etc/nivora/runner.yaml"]
    profiles: ["runner"]
    volumes:
      - ../../configs:/etc/nivora:ro

volumes:
  postgres-data:
  minio-data:
