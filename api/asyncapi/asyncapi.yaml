  devops.runner.offline:
    address: devops.runner.offline
    description: Reserved for future runner health handling; not emitted by the Phase 2.0 runtime.
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.artifact.scanned:
    address: devops.artifact.scanned
    description: Reserved for future artifact scanning; not emitted by the Phase 2.0 runtime.
    messages:
      event:
        $ref: "#/components/messages/Event"
  devops.policy.violation.detected:
    address: devops.policy.violation.detected
    description: Reserved for future policy engines; not emitted by the Phase 2.0 allow-all pre-check.
    messages:
      event:
        $ref: "#/components/messages/Event"
components:
  messages:
    Event:
      name: Event
      payload:
        $ref: "#/components/schemas/EventEnvelope"
  schemas:
    EventEnvelope:
      type: object
      required: [specversion, id, type, source, time, datacontenttype, data]
      properties:
        specversion:
          type: string
          example: "1.0"
        id:
          type: string
        type:
          type: string
        source:
          type: string
        subject:
          type: string
        time:
          type: string
          format: date-time
        datacontenttype:
          type: string
          example: application/json
        data:
          type: object
